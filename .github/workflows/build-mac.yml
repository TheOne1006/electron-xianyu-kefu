name: Build macOS

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Setup Build
        id: setup
        uses: ./.github/actions/setup-build

      - name: 导入 Apple 证书
        if: ${{ env.APPLE_CERTIFICATE != '' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # 将 base64 证书解码为 p12 文件
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12

          # 创建临时 Keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="actions_temp_$(date +%s)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychains -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # 设置 Keychain 分区列表，确保证书可被找到
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: 构建 macOS 应用（签名 + 公证）
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm exec electron-builder --mac --publish never

      - name: 构建 macOS 应用（无签名）
        if: ${{ secrets.APPLE_CERTIFICATE == '' }}
        env:
          CSC_IDENTITY: null
        run: pnpm exec electron-builder --mac --publish never

      - name: 上传产物到 Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.setup.outputs.version }}"
          TAG="v${VERSION}"
          gh release upload "${TAG}" dist/mac-arm64/*.dmg dist/mac-arm64/*.zip --clobber

      - name: 清理 Keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi
          rm -f certificate.p12
